name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  flatten-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run benchmark
        run: |
          mkdir -p output/benchmarks
          python scripts/benchmark_flatten.py > output/benchmarks/flatten-benchmark.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatten-benchmark
          path: output/benchmarks/flatten-benchmark.json
