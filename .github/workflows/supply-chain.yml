name: Supply Chain

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**
  schedule:
    - cron: "30 5 * * 1"

jobs:
  sbom-and-provenance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Generate SBOM
        run: make sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: output/sbom.cdx.json

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: output/sbom.cdx.json

  dependency-vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pip-audit (block on any vulnerability)
        run: make audit
